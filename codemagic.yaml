workflows:
  ios-app-store:
    name: Friday Night Lights — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic FNL
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jonathangoldner.fridaynightlights
      vars:
        XCODE_PROJECT: "FridayNightLights.xcodeproj"
        XCODE_SCHEME: "FridayNightLights"
    scripts:
      - name: Set build number
      script: agvtool next-version -all
      - name: Build iOS app
        script: |
          xcode-project use-profiles
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/FridayNightLights.xcarchive \
            archive
      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - "**/*.ipa"
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
